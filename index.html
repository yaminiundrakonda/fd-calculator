<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FD Calculator</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="calculator">
        <h1>FD Calculator</h1>

        <!-- Investment Amount -->
        <div class="input-section">
            <label for="investment">Total Investment</label>
            <input
                type="range"
                id="investment"
                min="1000"
                max="1000000"
                step="1000"
                value="100000"
            >
            <span id="investment-value">1,00,000</span>
        </div>

        <!-- Interest Rate -->
        <div class="input-section">
            <label for="interest-rate">Rate of Interest (%)</label>
            <input
                type="range"
                id="interest-rate"
                min="1"
                max="18"
                step="0.1"
                value="6.5"
            >
            <span id="interest-rate-value">6.5%</span>
        </div>

        <!-- Time Period -->
        <div class="input-section">
            <label for="time-period">Time Period (Years)</label>
            <input
                type="range"
                id="time-period"
                min="1"
                max="30"
                step="1"
                value="5"
            >
            <span id="time-period-value">5 Years</span>
        </div>

        <!-- Calculate Button -->
        <button onclick="calculator()">Invest Now</button>

        <!-- Result Section -->
        <div class="output-section">
            <p>
                Invested Amount:
                <span id="invested-amount">₹0</span>
            </p>

            <p>
                Estimated Returns:
                <span id="estimated-returns">₹0</span>
            </p>

            <p>
                Total Amount:
                <span id="total-value">₹0</span>
            </p>
        </div>
    </div>

</body>
</html>
